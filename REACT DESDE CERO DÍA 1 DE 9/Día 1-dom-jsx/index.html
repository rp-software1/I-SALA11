<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Restaurante — DOM puro</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .carta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .plato {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            width: 180px;
        }

        .agotado {
            opacity: 0.5;
            border-color: #f00;
        }

        .estado {
            font-size: 12px;
            margin-top: 6px;
        }
    </style>
</head>

<body>
    <h1>Carta del Restaurante</h1>
    <div id="carta"></div>
    <button id="btnAgregar">Agregar plato</button>

    <script>
        let platos = [
            { id: 1, nombre: "Lomo saltado", categoria: "segundos", precio: 18, stock: 3, disponible: true },
            { id: 2, nombre: "Arroz con pollo", categoria: "segundos", precio: 12, stock: 5, disponible: true },
            { id: 3, nombre: "Sopa de verduras", categoria: "entradas", precio: 8, stock: 0, disponible: false },
        ];

        function renderCarta(platos) {
            const contenedor = document.getElementById("carta");
            contenedor.innerHTML = "";

            platos.forEach(plato => {
                const div = document.createElement("div");
                div.className = "plato" + (plato.disponible ? "" : " agotado");
                div.innerHTML = `
          <h3>${plato.nombre}</h3>
          <p>${plato.categoria}</p>
          <p>S/ ${plato.precio}</p>
          <p>Stock: ${plato.stock}</p>
          <p class="estado">${plato.disponible ? "✅ Disponible" : "❌ Agotado"}</p>
        `;
                contenedor.appendChild(div);
            });
        }

        document.getElementById("btnAgregar").addEventListener("click", () => {
            platos.push({ id: 4, nombre: "Ceviche", categoria: "entradas", precio: 22, stock: 2, disponible: true });
            renderCarta(platos);
        });

        renderCarta(platos);
    </script>
</body>

</html>
