<h1>Prueba de React</h1>

<div id="carta"></div>
<button id="btnAgregar">Agregar plato</button>

<script>
    let platos = [
        { id: 1, nombre: "Lomo saltado", precio: 18, stock: 3, disponible: true },
        { id: 2, nombre: "Arroz con pollo", precio: 12, stock: 5, disponible: true },
        { id: 3, nombre: "Sopa", precio: 8, stock: 0, disponible: false },
    ];

    function renderCarta(platos) {
        const output = document.getElementById("carta");
        output.innerHTML = "";

        let html = "<ul>";

        for (let i = 0; i < platos.length; i++) {
            const plato = platos[i];
            html += `<li>${plato.nombre} — S/ ${plato.precio} — Stock: ${plato.stock}</li>`;
        }

        html += "</ul>";
        output.innerHTML = html;

    }



    document.getElementById("btnAgregar").addEventListener("click", () => {
        platos.push({
            id: 4,
            nombre: "Ceviche",
            precio: 22,
            stock: 4,
            disponible: true
        });

        renderCarta(platos);
    });


</script>
